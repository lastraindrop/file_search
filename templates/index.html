<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FileCortex - AI-powered workspace orchestration and file management tool for developers">
    <meta name="keywords" content="FileCortex, file manager, workspace, AI context, developer tool">
    <title>FileCortex v5.8.2 Production | Workspace Orchestrator</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <!-- Highlight.js (Monokai Theme) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/monokai-sublime.min.css" crossorigin="anonymous">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <noscript>
        <div style="background: #ef4444; color: white; padding: 20px; text-align: center; font-family: sans-serif;">
            <strong>JavaScript Required:</strong> This application requires JavaScript to function. Please enable it in your browser settings.
        </div>
    </noscript>
    <div class="container-fluid vh-100 d-flex flex-column p-0">
        <!-- Top Navigation -->
        <nav class="navbar navbar-expand-lg navbar-dark px-3 py-2 flex-shrink-0">
            <a class="navbar-brand fw-bold" href="#" style="color: var(--accent); letter-spacing: -0.5px;">
                <span class="me-1">💠</span> FileCortex <span class="badge bg-secondary text-white smaller ms-1" style="font-size: 0.6rem; vertical-align: middle; opacity: 0.8;">v5.8.2 Production</span>
            </a>
            <div class="d-flex ms-auto gap-2">
                <input type="text" id="projectPath" class="form-control form-control-sm" placeholder="Full Project Path" style="width: 300px;">
                <button id="btnPin" class="btn btn-outline-warning btn-sm" onclick="App.togglePin()" title="Pin Workspace">☆</button>
                <button class="btn btn-primary btn-sm px-3" onclick="App.openProject()">Open</button>
                <button class="btn btn-outline-light btn-sm" onclick="App.refreshProject()" title="Refresh Project">🔄</button>
            </div>
        </nav>

        <!-- Bulk Actions -->
        <div id="bulkActions" class="p-2 border-bottom d-flex justify-content-between align-items-center bg-light" style="display:none !important;">
            <div>
                <input type="checkbox" id="selectAllCb" class="form-check-input me-1" onchange="App.toggleSelectAll(this.checked)">
                <small id="selectedCount" class="fw-bold text-primary">0</small>
            </div>
            <div class="btn-group btn-group-sm">
                <button class="btn btn-outline-secondary" onclick="App.bulkMove()" title="Batch Move">✂️</button>
                <button class="btn btn-outline-warning" onclick="App.batchRename()" title="Batch Regex Rename">✏️</button>
                <button class="btn btn-outline-danger" onclick="App.bulkDelete()" title="Batch Delete">🗑️</button>
                <button class="btn btn-outline-success" onclick="App.bulkStage()" title="Batch Stage">⬇</button>
            </div>
        </div>

        <!-- Main Workspace -->
        <div class="row g-0 flex-grow-1 overflow-hidden">
            
            <!-- Sidebar: Recent Projects & Sessions -->
            <div id="workspaceSidebar" class="col-auto glass-panel border-end d-flex flex-column h-100 p-2" style="width: 60px; transition: width 0.3s;">
                <button class="btn btn-outline-light btn-sm mb-3" onclick="App.toggleSidebar()" title="Toggle Sidebar">☰</button>
                <div id="pinnedProjectsList" class="d-flex flex-column gap-2 mb-2 border-bottom pb-2"></div>
                <div id="recentProjectsList" class="d-flex flex-column gap-2 overflow-auto"></div>
            </div>

            <!-- Left Panel: File Browser & Search -->
            <div class="col-md-3 glass-panel border-end d-flex flex-column h-100">
                <!-- Search Box -->
                <div class="p-3 border-bottom">
                    <div class="input-group input-group-sm mb-2">
                        <span class="input-group-text bg-transparent border-end-0 text-muted">🔍</span>
                        <input type="text" id="searchInput" class="form-control border-start-0" placeholder="Search files...">
                    </div>
                    <div class="input-group input-group-sm mb-2">
                        <span class="input-group-text bg-transparent border-end-0 text-muted">🚫</span>
                        <input type="text" id="excludeInput" class="form-control border-start-0" placeholder="Excludes (comma separated)...">
                    </div>
                    <div class="d-flex gap-2">
                        <select id="searchMode" class="form-select form-select-sm">
                            <option value="smart">Smart Scan</option>
                            <option value="exact">Exact</option>
                            <option value="regex">Regex</option>
                            <option value="content">Content</option>
                        </select>
                        <button class="btn btn-primary btn-sm px-3" onclick="App.startSearch()">Find</button>
                    </div>
                </div>

                <!-- Tabs -->
                <ul class="nav nav-tabs nav-fill" id="leftTabs" role="tablist">
                    <li class="nav-item">
                        <button class="nav-link active py-2" id="tab-tree" data-bs-toggle="tab" data-bs-target="#panel-tree" type="button">📁 Files</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link py-2" id="tab-search" data-bs-toggle="tab" data-bs-target="#panel-search" type="button">Results</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link py-2" id="tab-fav" data-bs-toggle="tab" data-bs-target="#panel-fav" type="button">⭐ Favs</button>
                    </li>
                </ul>

                <div class="tab-content flex-grow-1 overflow-auto bg-transparent" id="leftTabContent">
                    <div class="tab-pane fade show active p-2" id="panel-tree">
                        <div id="fileTreeRoot" class="small p-1">No project loaded.</div>
                    </div>
                    <div class="tab-pane fade p-2" id="panel-search">
                        <div id="searchResultsList" class="list-group list-group-flush small"></div>
                    </div>
                    <div class="tab-pane fade p-2" id="panel-fav">
                        <div class="mb-2 d-flex gap-2 p-1">
                            <select id="favGroupSelect" class="form-select form-select-sm" onchange="App.renderFavorites()"></select>
                        </div>
                        <div id="favoritesList" class="list-group list-group-flush small"></div>
                    </div>
                </div>
            </div>

            <!-- Center Panel: Preview & Info -->
            <div class="col-md-6 d-flex flex-column h-100">
                <div class="p-2 border-bottom d-flex justify-content-between align-items-center bg-transparent backdrop-blur">
                    <div class="d-flex align-items-center me-2 overflow-hidden">
                        <span id="currentFileName" class="fw-bold text-truncate" style="max-width: 300px;">Selected File</span>
                        <div id="fileTags" class="ms-2 d-flex gap-1"></div>
                    </div>
                    <div id="fileControls" class="btn-group btn-group-sm" style="display:none;">
                        <button class="btn btn-outline-success" onclick="App.addToStaging()" title="Add to Staging">⬇ Add</button>
                        <button class="btn btn-outline-warning" onclick="App.addToFavorites()" title="Add to Favorites">⭐</button>
                        <button class="btn btn-outline-info" onclick="App.showFileNote()" title="Notes">📝</button>
                        <button class="btn btn-outline-light" onclick="App.copyPath()" title="Copy Full Path">🔗</button>
                        <button class="btn btn-outline-light" onclick="App.renameFile()">✏️</button>
                        <button class="btn btn-outline-danger" onclick="App.deleteFile()">🗑️</button>
                        <button class="btn btn-primary" id="btnEditSave" onclick="App.toggleEdit()">Edit</button>
                    </div>
                </div>

                <!-- Note Overlay -->
                <div id="noteOverlay" class="glass-panel p-3 m-3 position-absolute start-0 end-0 translate-middle-y shadow-lg" style="display:none; z-index:100; top: 100px;">
                    <h6>File Notes</h6>
                    <textarea id="noteInput" class="form-control mb-2" rows="3"></textarea>
                    <div class="d-flex justify-content-end gap-2">
                        <button class="btn btn-sm btn-outline-light" onclick="App.hideFileNote()">Cancel</button>
                        <button class="btn btn-sm btn-primary" onclick="App.saveFileNote()">Save Note</button>
                    </div>
                </div>

                <div class="flex-grow-1 overflow-auto bg-black" id="previewContainer">
                    <pre class="m-0 h-100" id="preBlock"><code id="codePreview" class="hljs h-100 d-block p-4"></code></pre>
                    <textarea id="codeEditor" class="form-control w-100 h-100 border-0 rounded-0 p-4" style="display:none; background:#0a0a0a; color:#e2e8f0; resize:none;"></textarea>
                </div>
            </div>

            <!-- Right Panel: Staging -->
            <div class="col-md-2 glass-panel border-start d-flex flex-column h-100">
                <div class="p-3 border-bottom d-flex justify-content-between align-items-center">
                    <h6 class="m-0 fw-bold">🛒 Staging</h6>
                    <button class="btn btn-link text-muted p-0 text-decoration-none x-small" onclick="App.clearStaging()" title="Clear Staging List">Clear</button>
                    <span id="tokenEstimate" class="badge bg-info">0 Tokens</span>
                </div>
                <div class="flex-grow-1 overflow-auto p-2">
                    <div id="stagingList" class="list-group list-group-flush small mb-3"></div>
                    
                    <!-- Quick Actions Section -->
                    <div id="quickActionsSection" style="display:none;">
                        <hr class="text-muted">
                        <h6 class="small fw-bold text-muted mb-2">⚡ Quick Categorize</h6>
                        <div id="categoriesContainer" class="d-flex flex-wrap gap-1 mb-3"></div>
                        
                        <h6 class="small fw-bold text-muted mb-2">🛠️ Custom Tools</h6>
                        <div id="toolsContainer" class="d-flex flex-wrap gap-1"></div>
                    </div>
                </div>
                <div class="p-3 border-top">
                    <div class="mb-2">
                        <label class="small text-muted mb-1">📋 Prompt Template</label>
                        <select id="promptTemplate" class="form-select form-select-sm bg-dark text-white border-secondary">
                            <option value="">None (Standard)</option>
                        </select>
                    </div>
                    <button class="btn btn-outline-info btn-sm w-100 mb-2" onclick="App.archiveStaging()">📦 Archive Selection</button>
                    <button class="btn btn-outline-secondary btn-sm w-100 mb-2" onclick="App.showPathCollector()">🔗 Copy Paths</button>
                    <button class="btn btn-primary w-100 py-2 fw-bold pulse-accent" onclick="App.generateContext()">🚀 Copy Context</button>
                </div>
            </div>
        </div>
    </div>
    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1055;"></div>

    <!-- Tool Execution Result Modal -->
    <div class="modal fade" id="toolResultModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content glass-panel text-white">
          <div class="modal-header border-bottom border-secondary">
            <h5 class="modal-title" id="toolResultModalLabel">🔧 Tool Execution Results</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body p-0" id="toolResultModalBody" style="background: #0a0a0a; border-radius: 0 0 calc(var(--radius) - 1px) calc(var(--radius) - 1px);">
          </div>
        </div>
      </div>
    </div>
    <!-- Path Collection Modal -->
    <div class="modal fade" id="pathCollectorModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content glass-panel text-white">
          <div class="modal-header border-bottom border-secondary">
            <h5 class="modal-title">🧬 Path Collection & Formatting</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body p-4">
            <div class="mb-3">
                <label class="form-label small text-muted uppercase tracking-wider mb-1">Quick Presets</label>
                <select id="pathProfileSelect" class="form-select form-select-sm bg-dark text-white border-secondary" onchange="App.applyProfile()">
                    <option value="">Custom...</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="form-label small text-muted uppercase tracking-wider mb-2">Path Mode</label>
                <div class="d-flex gap-4">
                    <div class="form-check custom-radio">
                        <input class="form-check-input" type="radio" name="pathMode" id="pathModeRel" value="relative" checked>
                        <label class="form-check-label small" for="pathModeRel">Project Relative</label>
                    </div>
                    <div class="form-check custom-radio">
                        <input class="form-check-input" type="radio" name="pathMode" id="pathModeAbs" value="absolute">
                        <label class="form-check-label small" for="pathModeAbs">Full Absolute</label>
                    </div>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label small text-muted uppercase tracking-wider mb-2">Symbols & Extensions</label>
                <div class="row g-2">
                    <div class="col-6">
                        <label class="x-small text-muted">File Prefix</label>
                        <input type="text" id="pathFilePrefix" class="form-control form-control-sm bg-dark text-white border-secondary" value="" placeholder="e.g. @">
                    </div>
                    <div class="col-6">
                        <label class="x-small text-muted">Folder Suffix</label>
                        <input type="text" id="pathDirSuffix" class="form-control form-control-sm bg-dark text-white border-secondary" value="/" placeholder="e.g. /">
                    </div>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label small text-muted uppercase tracking-wider mb-2 d-block">Separator</label>
                <div class="btn-group btn-group-sm mb-2 w-100">
                    <button class="btn btn-outline-secondary" onclick="document.getElementById('pathSep').value='\\n'">NewLine</button>
                    <button class="btn btn-outline-secondary" onclick="document.getElementById('pathSep').value=' '">Space</button>
                    <button class="btn btn-outline-secondary" onclick="document.getElementById('pathSep').value=' @'">Space+@</button>
                    <button class="btn btn-outline-secondary" onclick="document.getElementById('pathSep').value=' #'">Space+#</button>
                </div>
                <input type="text" id="pathSep" class="form-control form-control-sm bg-dark text-white border-secondary mt-1" value="\n" placeholder="Custom separator (e.g. \n, \t, etc.)">
            </div>
          </div>
          <div class="modal-footer border-top border-secondary">
            <button type="button" class="btn btn-sm btn-outline-light" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-sm btn-primary px-4" onclick="App.collectPaths()">✅ Copy Results</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" crossorigin="anonymous"></script>
    <!-- Markdown & Mermaid -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js" crossorigin="anonymous"></script>
    <script>mermaid.initialize({ startOnLoad: false, theme: 'dark' });</script>
    <!-- Custom App Logic -->
    <script src="/static/js/app.js"></script>
</body>
</html>
